name: Deploy archive index to GitHub Pages

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: archive-index-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python -m unittest discover -s tests
      - run: python scripts/generate_archive_index.py
      - name: Summarize generated archive index
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json

          with open("public/index.json", encoding="utf-8") as f:
              index = json.load(f)

          print("## Generated archive index")
          print()
          print(f"- Communities: {len(index['communities'])}")
          print(f"- Events: {len(index['events'])}")
          print(f"- Source: {index['source']['name']}")
          print()
          print("Download `archive-index-json` from this workflow run to inspect `index.json`.")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: archive-index-json
          path: public/index.json
          if-no-files-found: error
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: public

  deploy:
    if: github.event_name != 'pull_request'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
